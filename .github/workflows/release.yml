name: Publish Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+" # Stable: 1.2.3
      - "[0-9]+.[0-9]+.[0-9]+-*" # Preview: 1.2.3-alpha.1

permissions:
  contents: write

jobs:
  test:
    name: Verify before publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/global.json', '.config/dotnet-tools.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Run tests
        run: dotnet loom Test

  release:
    name: Release Artifacts for ${{ matrix.rid }}
    needs: test
    runs-on: ${{ matrix.runner_os }}
    strategy:
      matrix:
        include:
          - { runner_os: ubuntu-latest, rid: linux-x64 }
          - { runner_os: windows-latest, rid: win-x64 }
          # - { runner_os: macos-latest, rid: osx-x64 }
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/global.json', '.config/dotnet-tools.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Run Loom Release Pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          Nuget__ApiKey: ${{ secrets.NUGET_API_KEY }}
        run: dotnet loom Release
